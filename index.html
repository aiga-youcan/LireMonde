<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LireMonde - Édition Aurora Claire</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="flex flex-col min-h-screen text-slate-800 overflow-x-hidden">
    <div class="aurora-bg z-[-1]">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="glass-overlay"></div>
    </div>

    <div class="w-full flex justify-center pt-6 sticky top-0 z-40 px-4">
      <nav
        class="navbar w-full max-w-6xl px-6 py-4 rounded-[2rem] flex flex-col md:flex-row justify-between items-center gap-5 transition-all"
      >
        <div class="flex items-center gap-3 group cursor-pointer">
          <div
            class="relative flex items-center justify-center w-10 h-10 rounded-xl bg-white/50 border border-white/60 shadow-sm group-hover:border-purple-300 transition-all"
          >
            <img src="images/logo.jpg" alt="Logo" class="w-6 h-6" />
          </div>
          <h1
            class="text-2xl font-bold tracking-tighter text-slate-800 font-space"
          >
            Lire<span
              class="text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-cyan-500"
              >Monde</span
            >
          </h1>
        </div>

        <div class="w-full md:w-2/5 relative group">
          <div
            class="absolute -inset-0.5 bg-gradient-to-r from-purple-300 to-cyan-300 rounded-2xl blur opacity-30 group-hover:opacity-50 transition duration-500"
          ></div>
          <div class="relative">
            <svg
              class="w-5 h-5 absolute left-4 top-3 text-slate-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              ></path>
            </svg>
            <input
              type="text"
              id="globalSearch"
              placeholder="Rechercher un livre, un auteur..."
              class="w-full pl-12 pr-4 py-2.5 rounded-2xl border border-white/60 bg-white/60 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-cyan-400 focus:bg-white/90 transition-all font-inter shadow-inner"
            />
          </div>
        </div>

        <div
          class="flex gap-2 bg-white/50 p-1.5 rounded-2xl border border-white/60 shadow-sm"
        >
          <button
            id="navAccueil"
            class="nav-link active cursor-pointer px-5 py-2 rounded-xl text-sm font-semibold transition-all font-space tracking-wide"
          >
            Accueil
          </button>
          <button
            id="navALire"
            class="nav-link cursor-pointer px-5 py-2 rounded-xl text-sm font-semibold transition-all font-space tracking-wide"
          >
            À lire
          </button>
          <button
            id="navAdmin"
            class="nav-link cursor-pointer px-5 py-2 rounded-xl text-sm font-semibold transition-all font-space tracking-wide"
          >
            Admin
          </button>
        </div>
      </nav>
    </div>

    <main class="w-full max-w-6xl mx-auto p-6 mt-8 flex-grow">
      <section id="sectionAccueil" class="space-y-12 fade-in-section">
        <div class="text-center space-y-4 mb-12">
          <h2
            class="text-4xl md:text-5xl font-bold text-slate-800 font-space tracking-tighter"
          >
            Explorez des univers
            <span
              class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-500 via-purple-500 to-pink-500"
              >infinis.</span
            >
          </h2>
          <p class="text-slate-500 font-inter text-lg max-w-2xl mx-auto">
            Votre bibliothèque personnelle, lumineuse et moderne.
          </p>
        </div>

        <div
          class="filter-card p-4 flex flex-col sm:flex-row items-center justify-center gap-4 border border-white/60 bg-white/40 shadow-sm rounded-[2rem] backdrop-blur-xl"
        >
          <span
            class="font-semibold text-slate-600 text-sm flex items-center gap-2 font-space tracking-widest uppercase"
          >
            <svg
              class="w-4 h-4 text-purple-500"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"
              ></path>
            </svg>
            Filtres
          </span>
          <div
            id="genresContainer"
            class="flex flex-wrap justify-center gap-2"
          ></div>
        </div>

        <div class="w-full relative">
          <div
            id="booksGrid"
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"
          ></div>
        </div>
      </section>

      <section
        id="sectionALire"
        class="hidden space-y-8 fade-in-section w-full"
      >
        <h2
          class="text-3xl font-bold text-slate-800 font-space tracking-tighter mb-8 flex items-center gap-3"
        >
          <span
            class="w-3 h-3 bg-pink-500 rounded-full animate-pulse shadow-[0_0_15px_#f472b6]"
          ></span>
          File d'attente
        </h2>
        <div
          id="aLireGrid"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
        ></div>
      </section>

      <section
        id="sectionAdmin"
        class="hidden space-y-12 fade-in-section w-full"
      >
        <h2
          class="text-3xl font-bold text-slate-800 font-space tracking-tighter flex items-center gap-3"
        >
          <span
            class="w-3 h-3 bg-cyan-400 rounded-full animate-pulse shadow-[0_0_15px_#22d3ee]"
          ></span>
          Centre de Contrôle
        </h2>

        <div
          class="form-container bg-white/50 p-8 md:p-10 max-w-3xl mx-auto rounded-[2.5rem] border border-white/80 shadow-[0_20px_40px_rgba(0,0,0,0.05)] backdrop-blur-2xl relative overflow-hidden"
        >
          <div
            class="absolute -top-24 -right-24 w-48 h-48 bg-purple-300/40 rounded-full blur-[60px]"
          ></div>

          <h3
            id="formTitle"
            class="text-2xl font-bold mb-8 text-slate-800 font-space tracking-tight"
          >
            Nouvelle Entrée
          </h3>

          <form id="bookForm" class="space-y-6 relative z-10 font-inter">
            <input type="hidden" id="bookId" />
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label
                  class="block text-[10px] font-bold text-cyan-600 uppercase tracking-[0.2em]"
                  >Titre du livre</label
                >
                <input
                  type="text"
                  id="formTitre"
                  required
                  class="w-full border-b border-slate-300 bg-white/40 text-slate-800 p-2 text-lg focus:border-cyan-500 focus:outline-none transition-all placeholder-slate-400 rounded-t-lg"
                  placeholder="Ex: Dune"
                />
              </div>
              <div class="space-y-2">
                <label
                  class="block text-[10px] font-bold text-purple-600 uppercase tracking-[0.2em]"
                  >Auteur</label
                >
                <input
                  type="text"
                  id="formAuteur"
                  required
                  class="w-full border-b border-slate-300 bg-white/40 text-slate-800 p-2 text-lg focus:border-purple-500 focus:outline-none transition-all placeholder-slate-400 rounded-t-lg"
                />
              </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label
                  class="block text-[10px] font-bold text-pink-600 uppercase tracking-[0.2em]"
                  >Genre</label
                >
                <select
                  id="formGenre"
                  required
                  class="w-full border-b border-slate-300 bg-white/40 text-slate-800 p-2 text-lg focus:border-pink-500 focus:outline-none transition-all cursor-pointer rounded-t-lg"
                >
                  <option value="Classique">Classique</option>
                  <option value="Science-fiction">Science-fiction</option>
                  <option value="Drame">Drame</option>
                  <option value="Fantasy">Fantasy</option>
                </select>
              </div>
              <div class="space-y-2">
                <label
                  class="block text-[10px] font-bold text-emerald-600 uppercase tracking-[0.2em]"
                  >URL Couverture</label
                >
                <input
                  type="url"
                  id="formCouverture"
                  required
                  class="w-full border-b border-slate-300 bg-white/40 text-slate-800 p-2 text-lg focus:border-emerald-500 focus:outline-none transition-all placeholder-slate-400 rounded-t-lg"
                  placeholder="https://..."
                />
              </div>
            </div>
            <div class="space-y-2 pt-4">
              <label
                class="block text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]"
                >Description</label
              >
              <textarea
                id="formDescription"
                required
                rows="2"
                class="w-full border border-slate-200 bg-white/50 text-slate-800 p-4 rounded-2xl text-sm focus:ring-1 focus:ring-slate-300 focus:border-slate-300 focus:outline-none transition-all resize-none shadow-inner"
              ></textarea>
            </div>
            <div class="flex gap-4 pt-6">
              <button
                type="submit"
                id="formSubmitBtn"
                class="bg-slate-800 text-white px-8 py-3.5 rounded-2xl text-sm font-bold hover:bg-slate-700 hover:shadow-lg transition-all cursor-pointer font-space uppercase tracking-wider"
              >
                Sauvegarder
              </button>
              <button
                type="button"
                id="formCancelBtn"
                class="hidden bg-white/50 border border-slate-300 text-slate-600 px-8 py-3.5 rounded-2xl text-sm font-bold hover:bg-white/80 transition-all cursor-pointer font-space uppercase tracking-wider"
              >
                Annuler
              </button>
            </div>
          </form>
        </div>

        <div
          class="bg-white/60 rounded-[2rem] shadow-xl overflow-hidden border border-white/80 backdrop-blur-xl mx-auto font-inter"
        >
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr
                  class="bg-white/40 text-[10px] tracking-[0.2em] uppercase border-b border-slate-200 text-slate-500 font-bold"
                >
                  <th class="p-6 w-24 text-center">Cover</th>
                  <th class="p-6">Titre</th>
                  <th class="p-6">Auteur</th>
                  <th class="p-6">Genre</th>
                  <th class="p-6 text-center">Actions</th>
                </tr>
              </thead>
              <tbody
                id="adminTableBody"
                class="divide-y divide-slate-100 text-sm"
              ></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <div
      id="detailsModal"
      class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden"
    >
      <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-md"></div>
      <div
        class="bg-white/90 rounded-[2.5rem] shadow-[0_20px_60px_rgba(0,0,0,0.15)] max-w-3xl w-full overflow-hidden relative z-10 animate-scale-up border border-white backdrop-blur-2xl"
      >
        <button
          id="closeModalBtn"
          class="absolute top-6 right-6 w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-rose-100 hover:text-rose-500 transition-all cursor-pointer z-10"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>
        <div id="modalContent" class="p-0 text-slate-800"></div>
      </div>
    </div>

    <footer
      class="mt-auto py-8 text-center text-xs font-space tracking-widest text-slate-400 uppercase w-full"
    >
      <p>&copy; 2026 LireMonde // Daylight Aurora.</p>
    </footer>

    <script src="scriptV1.js"></script>
  </body>
</html>
